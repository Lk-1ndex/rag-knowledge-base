services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  # arq 异步任务 worker：跑文档解析/向量化，与 backend 共用代码与 .env
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: ["arq", "worker.settings.WorkerSettings"]
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    networks:
      - internal

  # 本地 Embedding 服务（Infinity + BGE-M3），OpenAI 兼容 /v1/embeddings
  # 有 GPU 时启用 deploy.resources 加速；无 GPU 删除 deploy 块并改 --device cpu
  embedding:
    image: michaelf34/infinity:latest
    restart: unless-stopped
    command: ["v2", "--model-id", "BAAI/bge-m3", "--port", "7997", "--device", "cuda"]
    volumes:
      - ./data/hf_cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7997/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal
      - external

  # 证书自动续签（首签见 scripts/deploy.sh 的 bootstrap 流程）
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"]
    networks:
      - internal

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
