services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data/sqlite:/app/data/sqlite
      - ./data/uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
      target: build
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  qdrant:
    ports:
      - "6333:6333"

  redis:
    ports:
      - "6379:6379"

  embedding:
    ports:
      - "7997:7997"
